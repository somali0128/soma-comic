name: Sync social feed to Soma API

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: read

jobs:
  sync-api:
    runs-on: ubuntu-latest

    steps:
      - name: Ask Soma API to refresh social activity
        env:
          SOMA_API_ADMIN_KEY: ${{ secrets.SOMA_API_ADMIN_KEY }}
        run: |
          curl --fail-with-body --retry 2 \
            --request POST \
            --header "Authorization: Bearer ${SOMA_API_ADMIN_KEY}" \
            https://api.sticksoma.art/api/social-posts/sync
